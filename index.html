<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Listing Bot - Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background-color: #1e293b;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .release-title {
            font-size: 18px;
            color: #94a3b8;
            margin-bottom: 20px;
        }
        .btn-download {
            display: inline-block;
            background-color: #0284c7;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            transition: background-color 0.2s;
            margin-bottom: 25px;
        }
        .btn-download:hover {
            background-color: #0369a1;
        }
        .status-bar {
            border-top: 1px solid #334155;
            padding-top: 15px;
            font-size: 14px;
            color: #4ade80;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Auto Listing Bot</h1>
        <!-- रिलीज़ टाइटल को v1.0.0 किया गया है -->
        <div class="release-title">v1.0.0</div>
        
        <!-- डाउनलोड लिंक में फाइल का नाम और .exe एक्सटेंशन बिल्कुल सही कर दिया है -->

            Download Latest Setup
        </a>
        
        <!-- रिलीज़ टैग को v1.1.1 ही रखा गया है जो वेबसाइट पर शो होता है -->
        <div class="status-bar">
            SYSTEM ONLINE &middot; v1.1.1
        </div>
    </div>

</body>
